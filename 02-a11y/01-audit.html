<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <style>
    fieldset {
      border: 0;
      padding: 0;
      margin: 0;
    }
  </style>

  <body>
    <main>
      <h1>Exercide 01 - Audit</h1>
      <form>
        <label for="name">Name: </label><br />
        <input type="text" name="name" id="name" /><br /><br />
        <label for="address">Address: </label> <br />
        <input type="text" name="address" id="address" />
        <br /><br />
        <label for="city">City:</label><br />
        <input type="text" name="city" id="city" />
        <br /><br />
        <label for="zip">Zip Code:</label><br />
        <input type="text" name="zip" id="zip" />
        <br /><br />
        <fieldset>
          <legend>Card Type:</legend>
          <br />
          <input type="radio" name="card" id="visa" value="visa" />
          <label for="visa">Visa</label><br />
          <input type="radio" name="card" id="mastercard" value="mastercard" />
          <label for="mastercard">MasterCard</label><br />
          <input type="radio" name="card" id="amex" value="amex" />
          <label for="amex">American Express</label><br /><br />
        </fieldset>
        <label for="cc_number">Card Number: </label><br />
        <input type="text" name="cc_number" id="cc_number" /><br /><br />
        <label for="cvv">CVV: </label><br />
        <input type="text" name="cvv" id="cvv" /><br /><br />
        <input type="button" value="Submit" />
      </form>
    </main>
  </body>
</html>
