<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Exercise 02 - Form</title>
  </head>
  <style>
    fieldset{
      border: 0; 
      padding: 0; 
      margin: 0;
    }
  </style>
  <body>
    <main>
      <!-- Add your code here-->
      <h1>Roth IRA Calculator</h1>
      <form action="/submitform">
        <div>
          <label for="balance">Balance ($)</label>
          <br />
          <input type="text" id="balance" name="balance">
        </div>
        <br />
        <div>
          <label for="contribution">Annual contribution (4)</label>
          <br />
          <input type="text" id="contribution" name="contribution">
        </div>
        <br />
        <fieldset >
          <legend>Maximize contributions?</legend>
          <input type="radio" name="maximize" id="yes" value="yes">
          <label for="yes">Yes</label>
          <input type="radio" name="maximize" id="no" value="no">
          <label for="no">No</label>
        </fieldset>
        <br />
        <div>
          <label for="rate">Expected rate of return (5)</label>
          <br />
          <input type="number" id="rate" name="rate">
        </div>
        <br />
        <div>
          <label for="age">Current age</label>
          <br />
          <input type="number" id="age" name="age">
        </div>
        <br />
        <div>
          <label for="retirement-age">Retirement age</label>
          <br />
          <input type="number" id="retirement-age" name="retirement-age">
        </div>
        <br />
        <div>
          <label for="tax-rate">Marginal tax rate (%)</label>
          <br />
          <input type="number" id="tax-rate" name="tax-rate">
        </div>
        <br />
        <input type="submit" value="Calculate">
        <input type="reset" value="Reset">
      </form>
      <br />
      <p>This exercise is a simplified version of the Roth IRA Calculator at <a href="https://www.calculator.net/roth-ira-calculator.html">Calculator.net</a></p>
    </main>
  </body>
</html>
